    <path d="M264 552 L438 551" stroke="#050506" stroke-width="14" stroke-linecap="round"/>
    <circle cx="352" cy="552" r="23" fill="#d5d7d9" stroke="#63666a" stroke-width="5"/>
    <path d="M407 441 C427 452 450 452 470 438" fill="none" stroke="#aeb4ba" stroke-width="5" stroke-linecap="round"/>
    <path d="M438 420 L448 438 L468 438 L452 450 L458 470 L438 458 L420 470 L426 450 L410 438 L430 438 Z" fill="#d8dde2"/>
