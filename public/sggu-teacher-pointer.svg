    <circle cx="416" cy="264" r="24" fill="url(#blueEye)" stroke="#064d81" stroke-width="4"/>
    <circle cx="312" cy="255" r="7" fill="#e7fbff"/>
    <circle cx="424" cy="255" r="7" fill="#e7fbff"/>
    <circle cx="304" cy="268" r="8" fill="#07395f" opacity=".55"/>
    <circle cx="416" cy="268" r="8" fill="#07395f" opacity=".55"/>
    <path d="M359 270 C353 288 352 300 363 309" fill="none" stroke="#8e4c3a" stroke-width="5" stroke-linecap="round"/>
    <path d="M330 330 C350 316 377 316 396 330" fill="none" stroke="#1a0d0a" stroke-width="7" stroke-linecap="round"/>
    <circle cx="245" cy="304" r="6" fill="#fff4ee" opacity=".9"/>
    <circle cx="476" cy="304" r="6" fill="#fff4ee" opacity=".9"/>
  </g>
</svg>
