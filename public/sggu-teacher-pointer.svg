<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">강의봉으로 칠판을 가리키는 슥구 선생님</title>
  <desc id="desc">검은 머리, 파란 눈, 검은 정장 차림의 슥구가 긴 나무 강의봉을 손에 들고 왼쪽을 가리키는 전신 캐릭터 에셋</desc>
  <defs>
    <radialGradient id="skin" cx="46%" cy="34%" r="68%">
      <stop offset="0" stop-color="#fff1df"/>
      <stop offset="0.62" stop-color="#ffd8bd"/>
      <stop offset="1" stop-color="#e9a47e"/>
    </radialGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0e10"/>
      <stop offset="0.45" stop-color="#242528"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#222326"/>
      <stop offset="1" stop-color="#050607"/>
    </linearGradient>
    <linearGradient id="blueEye" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#77ecff"/>
      <stop offset="0.5" stop-color="#16a7e6"/>
      <stop offset="1" stop-color="#0570bf"/>
    </linearGradient>
    <linearGradient id="stick" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f8e4a6"/>
      <stop offset="0.18" stop-color="#c4843e"/>
      <stop offset="0.72" stop-color="#8a531f"/>
      <stop offset="1" stop-color="#4b2a12"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="12" flood-color="#082f1c" flood-opacity="0.23"/>
    </filter>
  </defs>

  <ellipse cx="374" cy="836" rx="172" ry="32" fill="#0f2f1f" opacity=".13"/>

  <!-- pointer behind hand but in front of body -->
  <g transform="rotate(-17 350 455)">
    <rect x="42" y="426" width="512" height="16" rx="8" fill="url(#stick)" stroke="#5f3718" stroke-width="3"/>
    <circle cx="42" cy="434" r="17" fill="#fff4bf" stroke="#8a531f" stroke-width="4"/>
    <circle cx="42" cy="434" r="8" fill="#fdf7d3"/>
  </g>

  <g filter="url(#softShadow)">
    <!-- legs -->
    <path d="M292 566 C274 642 264 710 260 797 C260 819 287 826 306 812 C316 739 323 665 336 586 Z" fill="#111214" stroke="#050506" stroke-width="8"/>
