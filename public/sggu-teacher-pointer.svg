    <!-- hair silhouette -->
    <path d="M196 206 C178 151 205 91 263 60 C236 50 225 39 216 24 C265 30 316 35 355 66 C404 34 468 42 514 78 C554 108 565 153 548 211 C520 155 478 136 439 137 C408 91 353 82 299 104 C255 116 219 143 196 206 Z" fill="url(#hair)" stroke="#030405" stroke-width="8"/>
