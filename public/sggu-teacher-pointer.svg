    <path d="M153 488 C172 499 187 511 204 528" fill="none" stroke="#6b341f" stroke-width="5" stroke-linecap="round"/>
    <path d="M180 487 C192 499 203 511 215 526" fill="none" stroke="#6b341f" stroke-width="4" stroke-linecap="round"/>

    <!-- right arm behind back -->
    <path d="M445 388 C494 421 515 474 504 526 C490 546 462 540 455 518 C460 480 449 449 419 430 Z" fill="url(#suit)" stroke="#050506" stroke-width="8"/>
    <path d="M477 523 C455 550 418 554 384 541" fill="none" stroke="#050506" stroke-width="8" stroke-linecap="round"/>

    <!-- neck and ears -->
    <path d="M322 294 L319 349 C335 373 385 374 404 349 L400 293 Z" fill="url(#skin)" stroke="#6b341f" stroke-width="7"/>
    <ellipse cx="207" cy="255" rx="38" ry="52" fill="url(#skin)" stroke="#6b341f" stroke-width="8"/>
    <ellipse cx="512" cy="255" rx="38" ry="52" fill="url(#skin)" stroke="#6b341f" stroke-width="8"/>
