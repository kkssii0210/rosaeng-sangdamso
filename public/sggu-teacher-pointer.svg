    <path d="M283 96 C250 132 227 170 218 218" fill="none" stroke="#3b3d40" stroke-width="8" stroke-linecap="round" opacity=".55"/>
    <path d="M402 94 C452 113 489 141 511 189" fill="none" stroke="#3b3d40" stroke-width="8" stroke-linecap="round" opacity=".55"/>
    <path d="M334 103 C367 90 413 94 455 121" fill="none" stroke="#3c3e42" stroke-width="7" stroke-linecap="round" opacity=".45"/>

    <!-- eyebrows and eyes -->
    <path d="M246 234 C286 217 324 219 350 232" fill="none" stroke="#050506" stroke-width="13" stroke-linecap="round"/>
    <path d="M470 234 C429 217 391 219 365 232" fill="none" stroke="#050506" stroke-width="13" stroke-linecap="round"/>
    <path d="M248 262 C277 242 322 242 346 263 C329 286 279 290 248 262 Z" fill="#ffffff" stroke="#050506" stroke-width="7"/>
    <path d="M472 262 C443 242 398 242 374 263 C392 286 442 290 472 262 Z" fill="#ffffff" stroke="#050506" stroke-width="7"/>
